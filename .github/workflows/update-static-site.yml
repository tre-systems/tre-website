name: Update Projects

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PROJECTS_GITHUB_TOKEN: ${{ secrets.PROJECTS_GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      # PROJECTS_GITHUB_TOKEN must read the private tre-systems repos whose
      # metadata and README images should be refreshed onto the public site.
      # continue-on-error so a token/API problem during refresh can never block
      # the deploy — the job falls through and ships the committed site instead.
      - name: Update projects
        if: ${{ env.PROJECTS_GITHUB_TOKEN != '' }}
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node build-projects.js

      - name: Skip project update
        if: ${{ env.PROJECTS_GITHUB_TOKEN == '' }}
        run: echo "Skipping project refresh because PROJECTS_GITHUB_TOKEN is not configured."

      - name: Commit changes
        run: |
          test -z "$(git status --porcelain index.html generated/project-images)" || {
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git add index.html generated/project-images
            git commit -m "chore: update projects"
            git push
          }

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy . --project-name=tre-website
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
